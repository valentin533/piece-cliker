<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pieces Clicker - PHONK EDITION V64</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #0f0c29; color: white; overflow: hidden; }
        #credits { position: fixed; top: 10px; right: 20px; font-size: 0.8rem; color: #ffcc00; z-index: 1000; }
        
        /* Annonce Globale */
        #global-announcement {
            position: fixed; top: -100px; left: 0; width: 100%; background: white; color: black;
            padding: 20px; text-align: center; font-weight: bold; font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(255,255,255,0.5); z-index: 10000; transition: top 0.5s ease;
        }

        #menu-accueil { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1b1464, #0f0c29); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #btn-play { padding: 20px 60px; font-size: 2rem; background: #2ecc71; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #2ecc71; margin-bottom: 20px; }
        #btn-reset { padding: 10px 25px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8rem; opacity: 0.8; }

        #sidebar { width: 300px; background: rgba(0,0,0,0.9); border-right: 2px solid #00d2ff; padding: 15px; display: flex; flex-direction: column; }
        .tab-container { height: 100px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #333; background: #050505; border-radius: 5px; font-size: 0.75rem; padding: 5px; }
        .tab-title { color: #00d2ff; text-align: center; font-size: 0.7rem; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        #chat-box { flex-grow: 1; background: #000; border: 1px solid #444; padding: 10px; font-size: 0.8rem; overflow-y: auto; color: #00ff00; margin-bottom: 10px; border-radius: 5px; }
        #chat-input { background: #222; border: 1px solid #00d2ff; color: white; padding: 10px; border-radius: 5px; width: 93%; outline: none; }

        #game-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #zone-clic { text-align: center; cursor: pointer; border: 8px solid #ffcc00; border-radius: 50%; width: 130px; height: 130px; display: flex; flex-direction: column; justify-content: center; background: rgba(255, 204, 0, 0.1); transition: transform 0.05s; }
        #zone-clic:active { transform: scale(0.95); }

        .boutique { background: #16213e; padding: 15px; border-radius: 15px; width: 480px; margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 400px; overflow-y: auto; border: 1px solid #333; }
        .shop-btn { padding: 12px; cursor: pointer; border-radius: 8px; border: none; font-size: 0.75rem; color: white; background: #1e272e; font-weight: bold; line-height: 1.2; }
        .full { grid-column: span 2; }
        
        #btn-event-global { background: linear-gradient(45deg, #ff4757, #ffa502); border: 2px solid gold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.8; } }
        
        .fondateur-tag { color: #ffcc00; font-weight: bold; text-shadow: 0 0 8px #ffcc00; }
        .dev-btn { background: linear-gradient(45deg, #2980b9, #8e44ad) !important; border: 2px solid #00d2ff !important; }
    </style>
</head>
<body>
    <div id="credits">V64 - Valentin Dev</div>
    <div id="global-announcement"></div>

    <div id="menu-accueil">
        <h1 style="color:#ffcc00; font-size: 3rem; margin-bottom: 20px;">PIECES CLICKER</h1>
        <button id="btn-play" onclick="lancerTout()">JOUER</button>
        <button id="btn-reset" onclick="reinitialiserCompte()">CHANGER DE COMPTE</button>
    </div>

    <div id="sidebar">
        <div class="tab-title">🏆 Richesse</div>
        <div id="liste-richesse" class="tab-container"></div>
        <div class="tab-title" style="color:#a29bfe">🎖️ Niveaux</div>
        <div id="liste-niveaux" class="tab-container"></div>
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Message..." onkeypress="if(event.key === 'Enter') envoyerMessage()">
    </div>

    <div id="game-container">
        <div id="zone-clic" onclick="cliquer()">
            <h1 id="score" style="margin:0; color:#ffcc00; font-size: 2rem;">0</h1>
            <div style="font-size:0.8rem;">PIÈCES</div>
        </div>
        <p id="info-lvl" style="color:#00ffcc; font-weight:bold; margin-top:15px; font-size: 1.2rem;">Niveau 1</p>

        <div class="boutique">
            <button id="btn-event-global" class="shop-btn full" onclick="clicEventGlobal()">🎁 EVENT GLOBAL (+1 LVL) : --:--:--</button>
            
            <button class="shop-btn" style="background:#6c5ce7" onclick="acheterSubwoofer()">🔊 Subwoofer Bass (25k)<br>+500 Force</button>
            <button class="shop-btn" style="background:#00cec9" onclick="acheterDriftCar()">🚗 Drift Car (250k)<br>+5k/s Auto</button>
            <button class="shop-btn" style="background:#ff9f43" onclick="acheterDoubleLvl()">⏫ Boost Exp (250k)<br>+5 Niveaux</button>
            <button class="shop-btn" style="background:#54a0ff" onclick="acheterSuperAimant()">🧲 Aimant (1M)<br>+25k Force</button>
            
            <button class="shop-btn full" style="background:linear-gradient(45deg, #636e72, #2d3436)" onclick="acheterStudioPrive()">🎧 Studio de Mixage (5M)<br>+150k Force</button>
            
            <button class="shop-btn" style="background:#1dd1a1" onclick="acheterFermeDeBacons()">🥓 Ferme Bacons (2 Mrds)<br>+10M/s Auto</button>
            <button class="shop-btn" style="background:#fab1a0" onclick="acheterNeonCity()">🌃 Neon City (100M)<br>+2M/s Auto</button>

            <button class="shop-btn full" style="background:linear-gradient(45deg, #f1c40f, #f39c12)" onclick="acheterIlluminati()">👁️ SECRET ILLUMINATI (50 Mrds)<br>Force de Clic x10</button>
            <button class="shop-btn full" style="background:linear-gradient(45deg, #2c3e50, #000000); color:#ffcc00; border:1px solid gold;" onclick="acheterTrouNoir()">🕳️ TROU NOIR (1 Trillion)<br>+1 Milliard/s</button>

            <button class="shop-btn" style="background:#8e44ad" onclick="acheterPotion()">🧪 Potion XP (15k)</button>
            <button class="shop-btn" style="background:#d35400" onclick="acheterPioche()">⛏️ Pioche +50 (5k)</button>

            <button id="btn-admin-msg" class="shop-btn full dev-btn" style="display:none; background: #fff !important; color: #000 !important;" onclick="diffuserAnnonce()">📢 ENVOYER UNE ANNONCE GLOBALE</button>
            <button id="btn-admin-lvl" class="shop-btn full dev-btn" style="display:none;" onclick="adminBoost()">💎 ADMIN : +10 000 LVL</button>
            <button id="btn-dev-click" class="shop-btn full dev-btn" style="display:none;" onclick="achatDevClick()">🔥 MEGA CLIC DEV (+900M)</button>
        </div>
    </div>

    <script>
        let pieces = 0, total = 0, lvl = 1, force = 1, robots = 0, usines = 0, pseudo = "", isDev = false;
        let bots = [{ n: "Lucas", a: 500, l: 1 }, { n: "Emma", a: 1200, l: 2 }, { n: "Saphir", a: 3000, l: 5 }];
        const dateFinFixe = new Date("March 26, 2026 22:30:00").getTime();

        function reinitialiserCompte() { localStorage.removeItem("clicker_V64"); location.reload(); }

        function lancerTout() {
            let save = JSON.parse(localStorage.getItem("clicker_V64"));
            if(save) {
                pieces = save.pieces; total = save.total; lvl = save.lvl; 
                force = save.force; robots = save.robots; usines = save.usines;
                pseudo = save.pseudo; isDev = save.isDev;
            } else {
                pseudo = prompt("Pseudo :") || "Joueur";
                if(pseudo === "Valentin_Dev") { isDev = true; pieces = 1000000000; lvl = 100; force = 5000; }
            }
            if(isDev) {
                document.getElementById('btn-admin-lvl').style.display = "block";
                document.getElementById('btn-dev-click').style.display = "block";
                document.getElementById('btn-admin-msg').style.display = "block";
            }
            document.getElementById('menu-accueil').style.display = 'none';
            setInterval(boucle, 1000);
            actualiser();
        }

        function diffuserAnnonce() {
            let msg = prompt("Message global :");
            if(msg) {
                let banner = document.getElementById('global-announcement');
                banner.innerHTML = `<span style="color:red">📢 [FONDATEUR] Valentin :</span> ${msg}`;
                banner.style.top = "0";
                setTimeout(() => { banner.style.top = "-100px"; }, 7000);
            }
        }

        function boucle() {
            let gainAuto = (robots * 3 + usines * 8000);
            pieces += gainAuto; total += gainAuto;
            
            let maintenant = new Date().getTime();
            let distance = dateFinFixe - maintenant;
            let btnE = document.getElementById('btn-event-global');

            if (distance > 0) {
                let h = Math.floor(distance / (3600000)), m = Math.floor((distance % 3600000) / 60000), s = Math.floor((distance % 60000) / 1000);
                btnE.innerText = `🎁 EVENT GLOBAL (+1 LVL) : ${h}h ${m}m ${s}s`;
            } else { btnE.style.display = "none"; }

            actualiser();
            localStorage.setItem("clicker_V64", JSON.stringify({pieces, total, lvl, force, robots, usines, pseudo, isDev}));
        }

        function cliquer() {
            let gain = (force + (lvl * 2)) * (1 + (lvl * 0.1));
            pieces += gain; total += gain;
            while(total >= (lvl * 1000 * Math.pow(2, lvl-1))) { 
                lvl++; 
                if(lvl % 10 === 0 && !isDev) { pieces *= 0.5; alert("🚨 TAXE DE NIVEAU " + lvl + " 🚨"); }
            }
            actualiser();
        }

        // FONCTIONS BOUTIQUE
        function acheterSubwoofer() { if(pieces >= 25000) { pieces -= 25000; force += 500; ajouterMsg("SHOP", "🔊 Basses à fond !"); actualiser(); } }
        function acheterDriftCar() { if(pieces >= 250000) { pieces -= 250000; robots += 1666; ajouterMsg("SHOP", "🚗 Drift en cours..."); actualiser(); } }
        function acheterDoubleLvl() { if(pieces >= 250000) { pieces -= 250000; lvl += 5; actualiser(); } }
        function acheterSuperAimant() { if(pieces >= 1000000) { pieces -= 1000000; force += 25000; actualiser(); } }
        function acheterStudioPrive() { if(pieces >= 5000000) { pieces -= 5000000; force += 150000; actualiser(); } }
        function acheterFermeDeBacons() { if(pieces >= 2000000000) { pieces -= 2000000000; usines += 1250; actualiser(); } }
        function acheterNeonCity() { if(pieces >= 100000000) { pieces -= 100000000; usines += 250; actualiser(); } }
        function acheterIlluminati() { if(pieces >= 50000000000) { pieces -= 50000000000; force *= 10; ajouterMsg("👁️", "Clic x10 activé !"); actualiser(); } }
        function acheterTrouNoir() { if(pieces >= 1000000000000) { pieces -= 1000000000000; usines += 125000; ajouterMsg("⚠️", "1 Milliard/s généré !"); actualiser(); } }
        
        function acheterPotion() { if(pieces >= 15000) { pieces -= 15000; total += 100000; while(total >= (lvl * 1000 * Math.pow(2, lvl-1))) lvl++; actualiser(); } }
        function acheterPioche() { if(pieces >= 5000) { pieces -= 5000; force += 50; actualiser(); } }

        function clicEventGlobal() { lvl += 1; ajouterMsg("SYSTÈME", "⭐ " + pseudo + " gagne 1 niveau !"); actualiser(); }
        function adminBoost() { lvl += 10000; actualiser(); }
        function achatDevClick() { if(pieces >= 1000000000) { pieces -= 1000000000; force += 900000000; actualiser(); } }

        function envoyerMessage() {
            let i = document.getElementById('chat-input');
            if(i.value) { ajouterMsg(pseudo, i.value); i.value = ""; }
        }

        function ajouterMsg(p, m) {
            let cb = document.getElementById('chat-box');
            let label = (p === "Valentin_Dev") ? `<span class="fondateur-tag">[FONDATEUR] Valentin</span>` : p;
            cb.innerHTML += `<div><b>[${label}]</b>: ${m}</div>`;
            cb.scrollTop = cb.scrollHeight;
        }

        function actualiser() {
            document.getElementById('score').innerText = Math.floor(pieces).toLocaleString();
            document.getElementById('info-lvl').innerText = "Niveau " + lvl;
            let nDisplay = (pseudo === "Valentin_Dev") ? `<span class="fondateur-tag">[FONDATEUR] Valentin</span>` : pseudo;
            let d = [...bots, {n: nDisplay, a: pieces, l: lvl, isMe: true}].sort((a,b) => b.a - a.a);
            document.getElementById('liste-richesse').innerHTML = d.map((g,i) => `<div style="padding:2px; ${g.isMe?'background:rgba(0,210,255,0.2)':''}">#${i+1} ${g.n} - ${Math.floor(g.a).toLocaleString()}</div>`).join('');
            let d2 = [...d].sort((a,b) => b.l - a.l);
            document.getElementById('liste-niveaux').innerHTML = d2.map((g,i) => `<div style="padding:2px; ${g.isMe?'background:rgba(162,155,254,0.2)':''}">#${i+1} ${g.n} - Lvl ${g.l}</div>`).join('');
        }
    </script>
</body>
</html>
